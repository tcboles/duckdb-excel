#
# Build the extension binaries and publish them to GitHub Pages so the extension
# can be installed via:
#
#   SET allow_unsigned_extensions=true;
#   INSTALL excel FROM 'https://<user>.github.io/<repo>';
#   LOAD excel;
#
# Pages deploy runs on push to main and on manual workflow_dispatch. PRs and
# other branches build but don't deploy.
#
name: Main Extension Distribution Pipeline
on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || '' }}-${{ github.base_ref || '' }}-${{ github.ref != 'refs/heads/main' || github.sha }}
  cancel-in-progress: true

jobs:
  duckdb-stable-build:
    name: Build extension binaries (DuckDB ${{ matrix.duckdb_version }})
    strategy:
      fail-fast: false
      matrix:
        duckdb_version: [v1.4.4, v1.5.2]
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@main
    with:
      duckdb_version: ${{ matrix.duckdb_version }}
      ci_tools_version: main
      extension_name: excel
      # Default 'auto' trims the matrix on non-main branches — we publish from
      # `main` (Pages source), so force the full platform set so every release
      # lands the same arch coverage as a main-branch build.
      reduced_ci_mode: 'disabled'
      # duckdb v1.4.4's vendored third_party/fmt uses stdext::checked_array_iterator,
      # an MS extension removed in newer MSVC (VS 2022 17.10+). It no longer compiles
      # on GitHub's Windows runner image, so skip the v1.4.4 Windows builds. v1.5.2's
      # fmt is patched and builds fine, so it keeps the full matrix.
      exclude_archs: ${{ matrix.duckdb_version == 'v1.4.4' && 'windows_amd64;windows_amd64_mingw' || '' }}

  deploy-pages:
    name: Publish to GitHub Pages
    needs: duckdb-stable-build
    # Deploy on every push (any branch) and on manual dispatch. Skip PR builds since
    # they can't access secrets/permissions and would conflict with the head-branch run.
    #
    # `always()` so a non-essential platform failure in the build matrix
    # (e.g. windows_amd64) doesn't skip the deploy — consumers only install
    # the linux_*/osx_* binaries, so a Windows build break must not block
    # publishing the platforms that did build. The "Verify required
    # binaries present" step below still fails the deploy if any platform
    # we actually serve is missing, so a fully-broken build can never wipe
    # the live site.
    if: ${{ always() && github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download all extension artifacts
        uses: actions/download-artifact@v4
        with:
          # Matches every `excel-<duckdb_version>-extension-<arch>` artifact
          # produced by the build matrix, across all DuckDB versions.
          pattern: excel-v*-extension-*
          path: artifacts

      - name: Organize artifacts into DuckDB extension repo layout
        run: |
          set -euxo pipefail
          mkdir -p public
          for dir in artifacts/excel-v*-extension-*; do
            base="${dir##*/}"                          # excel-v1.4.3-extension-osx_arm64
            rest="${base#excel-}"                      # v1.4.3-extension-osx_arm64
            duckdb_version="${rest%%-extension-*}"     # v1.4.3
            arch="${rest##*-extension-}"               # osx_arm64
            ext_file=$(find "$dir" -name 'excel.duckdb_extension' | head -1)
            if [ -z "$ext_file" ]; then
              echo "::warning::no excel.duckdb_extension found in $dir"
              continue
            fi
            mkdir -p "public/${duckdb_version}/${arch}"
            gzip -nc "$ext_file" > "public/${duckdb_version}/${arch}/excel.duckdb_extension.gz"
            echo "deployed: ${duckdb_version}/${arch}/excel.duckdb_extension.gz"
          done
          PAGES_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          {
            echo '<!doctype html><meta charset="utf-8">'
            echo '<title>DuckDB Excel extension repository</title>'
            echo '<h1>DuckDB Excel extension repository</h1>'
            echo '<p>Install via:</p>'
            echo '<pre>SET allow_unsigned_extensions=true;'
            echo "INSTALL excel FROM '${PAGES_URL}';"
            echo 'LOAD excel;</pre>'
            echo '<h2>Available binaries</h2><ul>'
            (cd public && find . -name '*.duckdb_extension.gz' | sort | sed 's|^\./|<li><a href="|; s|$|">|; s|$|</a></li>|')
            echo '</ul>'
          } > public/index.html

      - name: Verify required binaries present
        # Guard for the `always()` deploy: a Windows/wasm build break is
        # tolerated, but if any platform we actually serve is missing for a
        # required DuckDB version we must NOT publish — a partial upload
        # would wipe those binaries off the live site. Fail loudly instead
        # so the previous good deploy stays in place.
        run: |
          set -euo pipefail
          required_versions="v1.4.4 v1.5.2"
          required_archs="linux_amd64 linux_arm64 osx_amd64 osx_arm64"
          missing=0
          for version in $required_versions; do
            for arch in $required_archs; do
              path="public/${version}/${arch}/excel.duckdb_extension.gz"
              if [ ! -s "$path" ]; then
                echo "::error::missing required binary $path"
                missing=1
              fi
            done
          done
          if [ "$missing" -ne 0 ]; then
            echo "Required binaries missing — refusing to publish a partial site."
            exit 1
          fi
          echo "All required linux_*/osx_* binaries present for: ${required_versions}"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
